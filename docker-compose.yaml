version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: matriz-riesgo-app
    environment:
      - NODE_ENV=production
      - PORT=4597
    ports:
      - "4597:4597"
    expose:
      - "4597"
    networks:
      - matriz-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4597/matriz-riesgos"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    volumes:
      - /data/coolify/matriz-riesgo/uploads:/app/public/uploads/matrices

networks:
  matriz-network:
    driver: bridge

volumes:
  postgres_data:
