version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: matriz-riesgo-app
    environment:
      - HOSTNAME=0.0.0.0
      - HOST=0.0.0.0
      - PORT=4597
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    ports:
      - "4597:4597"
    expose:
      - "4597"
    networks:
      - matriz-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://0.0.0.0:4597/matriz-riesgos || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    volumes:
      - /data/coolify/matriz-riesgo/uploads:/app/public/uploads/matrices

networks:
  matriz-network:
    driver: bridge

volumes:
  postgres_data:
