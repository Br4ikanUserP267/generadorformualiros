events {
    worker_connections 1024;
}

http {
    upstream nextjs {
        server app:4597;
    }

    server {
        listen 80;
        server_name _;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Proxy settings
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Path /matriz-riesgos;

        # Request timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Main application routes under /matriz-riesgos
        location /matriz-riesgos {
            # Rewrite /matriz-riesgos/* to /* for Next.js
            rewrite ^/matriz-riesgos(/.*)$ $1 break;
            proxy_pass http://nextjs;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Static assets under matriz-riesgos
        location /matriz-riesgos/_next/static {
            rewrite ^/matriz-riesgos(/_next/static/.*)$ $1 break;
            proxy_pass http://nextjs;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        location /matriz-riesgos/public {
            rewrite ^/matriz-riesgos(/public/.*)$ $1 break;
            proxy_pass http://nextjs;
            expires 30d;
            add_header Cache-Control "public";
        }

        # Fallback to root for backwards compatibility
        location / {
            return 301 /matriz-riesgos/;
        }
    }
}

